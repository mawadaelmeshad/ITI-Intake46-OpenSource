<div class="form-card" *ngIf="student">
  <h3>Student Details</h3>
  <div class="details-group">
    <strong>ID:</strong> {{ student.id }}
  </div>
  <div class="details-group">
    <strong>Name:</strong> {{ student.name }}
  </div>
  <div class="details-group">
    <strong>Age:</strong> {{ student.age }}
  </div>
</div>
