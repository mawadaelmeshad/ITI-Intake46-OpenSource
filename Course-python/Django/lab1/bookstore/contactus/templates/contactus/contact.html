<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ITI Bookstore</title>
    <!-- Tailwind CSS v3 via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen text-slate-800">
    <nav class="bg-white/70 backdrop-blur-md sticky top-0 z-50 border-b border-indigo-100">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'books.index' %}" class="text-2xl font-extrabold text-indigo-600 tracking-tight">ITI BOOKSTORE</a>
            <div class="space-x-8 text-sm font-semibold uppercase tracking-wider text-slate-600">
                <a href="{% url 'books.index' %}" class="hover:text-indigo-600 transition-colors">Books</a>
                <a href="{% url 'authors.landing' %}" class="hover:text-indigo-600 transition-colors">Authors</a>
                <a href="{% url 'aboutus.about' %}" class="hover:text-indigo-600 transition-colors">About</a>
                <a href="{% url 'contactus.contact' %}" class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Contact</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-20 max-w-lg text-center">
        <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 md:p-14 border border-white/50">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">Get In Touch</h1>
            <p class="text-slate-500 mb-10 font-medium italic text-sm md:text-base">We'd love to hear from you!</p>
            
            <div class="space-y-6 text-left">
                <div class="flex items-center space-x-4 bg-slate-50 p-4 rounded-xl border border-slate-100 hover:bg-slate-100 transition-colors cursor-pointer group shadow-sm">
                    <div class="w-12 h-12 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg group-hover:scale-110 transition-transform">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">Email</p>
                        <p class="text-slate-700 font-semibold truncate max-w-[180px] md:max-w-none">support@itibookstore.com</p>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4 bg-slate-50 p-4 rounded-xl border border-slate-100 hover:bg-slate-100 transition-colors cursor-pointer group shadow-sm">
                    <div class="w-12 h-12 bg-purple-600 rounded-lg flex items-center justify-center text-white shadow-lg group-hover:scale-110 transition-transform">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/></svg>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">Location</p>
                        <p class="text-slate-700 font-semibold">Smart Village, Giza, Egypt</p>
                    </div>
                </div>
            </div>
            
            <a href="{% url 'books.index' %}" class="mt-12 inline-block text-indigo-600 font-bold hover:text-indigo-800 transition-colors underline decoration-2 underline-offset-8">
                &larr; Return to Library
            </a>
        </div>
    </div>
</body>
</html>
