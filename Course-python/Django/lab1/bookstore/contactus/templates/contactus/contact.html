{% extends "base.html" %}

{% block title %}Contact Us - ITI Bookstore{% endblock %}

{% block content %}
    <div class="container mx-auto px-6 py-20 max-w-lg text-center">
        <div class="bg-white rounded-3xl shadow-2xl p-10 md:p-14 border border-slate-100">
            <h1 class="text-4xl font-black text-slate-900 mb-4 tracking-tighter">Get In Touch</h1>
            <p class="text-slate-500 mb-10 font-medium italic">We'd love to hear from you!</p>
            <div class="space-y-6 text-left">
                <div class="flex items-center space-x-4 bg-slate-50 p-6 rounded-2xl border border-slate-100 hover:bg-white transition-all shadow-sm">
                    <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg></div>
                    <div><p class="text-xs font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Email</p><p class="text-slate-700 font-bold">support@itibookstore.com</p></div>
                </div>
                <div class="flex items-center space-x-4 bg-slate-50 p-6 rounded-2xl border border-slate-100 hover:bg-white transition-all shadow-sm">
                    <div class="w-12 h-12 bg-purple-600 rounded-xl flex items-center justify-center text-white shadow-lg"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/></svg></div>
                    <div><p class="text-xs font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Location</p><p class="text-slate-700 font-bold">Smart Village, Giza, Egypt</p></div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
