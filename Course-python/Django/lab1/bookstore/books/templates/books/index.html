<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - All Books</title>
    <!-- Tailwind CSS v3 via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen text-slate-800">
    <nav class="bg-white/70 backdrop-blur-md sticky top-0 z-50 border-b border-indigo-100">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'books.index' %}" class="text-2xl font-extrabold text-indigo-600 tracking-tight">ITI BOOKSTORE</a>
            <div class="space-x-8 text-sm font-semibold uppercase tracking-wider text-slate-600">
                <a href="{% url 'books.index' %}" class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Books</a>
                <a href="{% url 'authors.landing' %}" class="hover:text-indigo-600 transition-colors">Authors</a>
                <a href="{% url 'aboutus.about' %}" class="hover:text-indigo-600 transition-colors">About</a>
                <a href="{% url 'contactus.contact' %}" class="hover:text-indigo-600 transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-16">
        <div class="flex items-center justify-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight text-center drop-shadow-sm">
                Library Collection
            </h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {% for book in books %}
            <div class="bg-white/80 backdrop-blur-md rounded-2xl shadow-sm hover:shadow-xl border border-white/50 transition-all duration-300 hover:-translate-y-2 overflow-hidden flex flex-col h-full">
                <div class="p-8 flex flex-col h-full">
                    <h5 class="text-xl font-bold text-slate-800 mb-2 leading-tight">
                        {{ book.title }}
                    </h5>
                    <p class="text-slate-500 font-medium mb-6 flex-grow">
                        {{ book.author }}
                    </p>
                    <a href="{% url 'books.book_info' book.id %}" class="mt-auto bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-purple-600 hover:to-indigo-500 text-white font-semibold py-2.5 px-6 rounded-xl shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300 text-center inline-block w-full sm:w-auto text-sm tracking-wide">
                        View Details &rarr;
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
