<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book.title }} - ITI Bookstore</title>
    <!-- Tailwind CSS v3 via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen text-slate-800">
    <nav class="bg-white/70 backdrop-blur-md sticky top-0 z-50 border-b border-indigo-100">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'books.index' %}" class="text-2xl font-extrabold text-indigo-600 tracking-tight">ITI BOOKSTORE</a>
            <div class="space-x-8 text-sm font-semibold uppercase tracking-wider text-slate-600">
                <a href="{% url 'books.index' %}" class="hover:text-indigo-600 transition-colors">Books</a>
                <a href="{% url 'authors.landing' %}" class="hover:text-indigo-600 transition-colors">Authors</a>
                <a href="{% url 'aboutus.about' %}" class="hover:text-indigo-600 transition-colors">About</a>
                <a href="{% url 'contactus.contact' %}" class="hover:text-indigo-600 transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-20 flex items-center justify-center">
        <div class="w-full max-w-2xl bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-10 md:p-14 text-center border border-white/50 transition-transform duration-300 hover:-translate-y-1">
            <h1 class="text-3xl md:text-5xl font-extrabold text-slate-900 mb-8 tracking-tight">
                {{ book.title }}
            </h1>
            
            <div class="flex flex-wrap justify-center gap-4 mb-10">
                <div class="bg-slate-100 rounded-2xl px-6 py-4 min-w-[160px] transition-colors hover:bg-slate-200 border border-slate-200 shadow-inner">
                    <span class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Author</span>
                    <span class="text-lg font-semibold text-slate-800">{{ book.author }}</span>
                </div>
                
                {% if book.year %}
                <div class="bg-slate-100 rounded-2xl px-6 py-4 min-w-[160px] transition-colors hover:bg-slate-200 border border-slate-200 shadow-inner">
                    <span class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Year</span>
                    <span class="text-lg font-semibold text-slate-800">{{ book.year }}</span>
                </div>
                {% endif %}
            </div>
            
            <a href="{% url 'books.index' %}" class="inline-block bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-purple-600 hover:to-indigo-500 text-white font-semibold py-3 px-8 rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
                &larr; Back to Library
            </a>
        </div>
    </div>
</body>
</html>
