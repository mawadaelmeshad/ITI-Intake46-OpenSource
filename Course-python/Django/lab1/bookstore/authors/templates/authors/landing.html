<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Authors - ITI Bookstore</title>
    <!-- Tailwind CSS v3 via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen text-slate-800">
    <nav class="bg-white/70 backdrop-blur-md sticky top-0 z-50 border-b border-indigo-100">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'books.index' %}" class="text-2xl font-extrabold text-indigo-600 tracking-tight">ITI BOOKSTORE</a>
            <div class="space-x-8 text-sm font-semibold uppercase tracking-wider text-slate-600">
                <a href="{% url 'books.index' %}" class="hover:text-indigo-600 transition-colors">Books</a>
                <a href="{% url 'authors.landing' %}" class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Authors</a>
                <a href="{% url 'aboutus.about' %}" class="hover:text-indigo-600 transition-colors">About</a>
                <a href="{% url 'contactus.contact' %}" class="hover:text-indigo-600 transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-16">
        <div class="flex items-center justify-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight text-center drop-shadow-sm">
                Our Featured Authors
            </h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto">
            {% for author in authors %}
            <div class="bg-white/90 backdrop-blur shadow-sm hover:shadow-xl border border-slate-100 p-8 rounded-3xl transition-all duration-300 hover:-translate-y-1">
                <div class="flex items-start space-x-6">
                    <div class="w-16 h-16 bg-gradient-to-tr from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold flex-shrink-0 shadow-lg">
                        {{ author.name|first }}
                    </div>
                    <div>
                        <h3 class="text-2xl font-bold text-slate-900 mb-2">{{ author.name }}</h3>
                        <p class="text-slate-500 text-sm font-medium mb-4 uppercase tracking-wider">{{ author.books_count }} Published Works</p>
                        <p class="text-slate-600 leading-relaxed italic">
                            "{{ author.bio }}"
                        </p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
