<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <!-- Tailwind CSS v3 via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen text-slate-800 flex items-center justify-center p-6">
    <div class="text-center max-w-2xl px-6">
        <h1 class="text-9xl font-black text-indigo-600/20 mb-[-3rem] animate-pulse">404</h1>
        <h2 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-6 tracking-tight">Lost in the Library?</h2>
        <p class="text-lg md:text-xl text-slate-500 mb-10 max-w-md mx-auto leading-relaxed italic">
            The page you are looking for seems to have been misplaced or borrowed indefinitely.
        </p>
        <a href="{% url 'books.index' %}" class="inline-block bg-gradient-to-r from-indigo-600 to-purple-700 text-white font-bold py-4 px-12 rounded-2xl shadow-xl hover:shadow-2xl transition-all hover:-translate-y-1">
            Back to Safe Harbor &rarr;
        </a>
    </div>
</body>
</html>
