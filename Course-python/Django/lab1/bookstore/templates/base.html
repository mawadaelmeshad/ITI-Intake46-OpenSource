<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ITI Bookstore{% endblock %}</title>
    <!-- Tailwind CSS v3 via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .nav-link { @apply transition-all duration-300 font-semibold px-4 py-2 rounded-xl hover:bg-indigo-50 hover:text-indigo-600; }
        .nav-link-active { @apply bg-indigo-50 text-indigo-600; }
        
        /* Mobile menu animation */
        #mobile-menu { transition: all 0.3s ease-in-out; max-height: 0; opacity: 0; overflow: hidden; }
        #mobile-menu.active { max-height: 500px; opacity: 1; padding: 1rem 0; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
    <!-- Responsive Navbar -->
    <nav class="glass sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <a href="{% url 'books_index' %}" class="text-2xl font-black text-indigo-600 tracking-tighter">
                    ITI BOOKSTORE
                </a>
                
                <!-- Desktop Navigation -->
                <div class="hidden md:flex items-center space-x-4 text-sm uppercase tracking-widest text-slate-500 font-bold">
                    <a href="{% url 'books_index' %}" class="nav-link {% if 'books' in request.path %}nav-link-active{% endif %}">Books</a>
                    <a href="{% url 'authors.landing' %}" class="nav-link {% if 'authors' in request.path %}nav-link-active{% endif %}">Authors</a>
                    <a href="{% url 'aboutus.about' %}" class="nav-link {% if 'about' in request.path %}nav-link-active{% endif %}">About</a>
                    <a href="{% url 'contactus.contact' %}" class="nav-link {% if 'contact' in request.path %}nav-link-active{% endif %}">Contact</a>
                </div>

                <div class="flex items-center space-x-4">
                    <!-- Action Buttons -->
                    <div class="hidden lg:flex items-center space-x-3 mr-4">
                        <a href="{% url 'book_create' %}" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold text-xs hover:bg-indigo-700 shadow-md transition-all">+ Book</a>
                        <a href="{% url 'authors.add' %}" class="bg-slate-900 text-white px-4 py-2 rounded-xl font-bold text-xs hover:bg-black shadow-md transition-all">+ Author</a>
                    </div>

                    <a href="/admin/" class="hidden md:block p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </a>
                    
                    <!-- Mobile Menu Toggle -->
                    <button id="menu-toggle" class="md:hidden p-2 text-slate-600 hover:text-indigo-600">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Mobile Navigation -->
            <div id="mobile-menu" class="md:hidden">
                <div class="flex flex-col space-y-2 text-sm uppercase tracking-widest text-slate-500 font-bold">
                    <a href="{% url 'books_index' %}" class="nav-link py-3 px-6">Books</a>
                    <a href="{% url 'authors.landing' %}" class="nav-link py-3 px-6">Authors</a>
                    <a href="{% url 'aboutus.about' %}" class="nav-link py-3 px-6">About</a>
                    <a href="{% url 'contactus.contact' %}" class="nav-link py-3 px-6">Contact</a>
                    <hr class="border-slate-100 mx-6">
                    <a href="{% url 'book_create' %}" class="nav-link py-3 px-6 text-indigo-600">+ Add Book</a>
                    <a href="{% url 'authors.add' %}" class="nav-link py-3 px-6 text-slate-900">+ Add Author</a>
                    <a href="/admin/" class="nav-link py-3 px-6 text-slate-400">Admin Dashboard</a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        document.getElementById('menu-toggle').addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('active');
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
